# ============================================================
# GitHub Actions CI — 每次 push / PR 自动运行测试和 lint
# ============================================================
#
# 触发条件:
#   - push 到 main / master 分支
#   - 任何分支的 Pull Request
#
# 检查内容:
#   1. 代码格式检查 (Ruff + Black)
#   2. 静态类型检查 (Mypy)
#   3. 单元测试 (pytest, 跳过需要 Ollama 的集成测试)
# ============================================================

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # 允许手动触发
  workflow_dispatch:

# 并发控制: 同一分支/PR 的新运行会取消旧运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: Lint — 代码质量检查
  # ============================================================
  lint:
    name: "🔍 Lint & Type Check"
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black mypy

      - name: 🔍 Ruff — 代码检查
        run: ruff check src/ tests/ app.py

      - name: 📐 Ruff — 格式检查
        run: ruff format --check src/ tests/ app.py

      - name: 🎨 Black — 格式检查
        run: black --check --diff src/ tests/ app.py

      - name: 📋 Mypy — 类型检查
        run: mypy src/ --ignore-missing-imports

  # ============================================================
  # Job 2: Test — 单元测试 (跳过集成测试)
  # ============================================================
  test:
    name: "🧪 Unit Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 运行单元测试
        run: |
          python -m pytest tests/ -v \
            --ignore-glob="*integration*" \
            -m "not integration" \
            --tb=short \
            --strict-markers

      - name: 📊 测试覆盖率报告
        run: |
          pip install pytest-cov
          python -m pytest tests/ -v \
            --ignore-glob="*integration*" \
            -m "not integration" \
            --cov=src \
            --cov-report=term-missing \
            --tb=short \
            --strict-markers
